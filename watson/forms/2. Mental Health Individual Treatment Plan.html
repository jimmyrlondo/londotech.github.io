    <script>
    // ==================== PREFERENCE LOADING (INLINE - RUNS BEFORE PAGE RENDERS) ====================
    (function() {
        try {
            const prefs = JSON.parse(localStorage.getItem('wchc_user_preferences') || '{}');
            if (prefs.highContrast === true) {
                document.documentElement.classList.add('high-contrast-mode');
            }
            if (prefs.fontSize) {
                document.documentElement.style.fontSize = prefs.fontSize + 'px';
            }
            if (prefs.lineHeight) {
                document.documentElement.style.lineHeight = prefs.lineHeight;
            }
            if (prefs.fontFamily) {
                document.documentElement.style.fontFamily = prefs.fontFamily;
            }
        } catch (e) {
            console.error('Could not load preferences:', e);
        }
    })();
    </script>
